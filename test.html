<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michael 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0e0f;--surface:#161618;--surface2:#1e1e21;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0efe8;--text2:#8a8a8f;--text3:#4a4a50;
  --green:#1db975;--gdim:rgba(29,185,117,0.12);
  --amber:#f5a623;--adim:rgba(245,166,35,0.12);
  --blue:#4a9eff;--bdim:rgba(74,158,255,0.1);
  --red:#ff5f5f;--purple:#a78bfa;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:20px 20px 60px;}
.wrap{max-width:576px;margin:0 auto;}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:18px;border-bottom:0.5px solid var(--border);}
.hdr-title{font-size:22px;font-weight:600;letter-spacing:-.5px;}
.hdr-sub{font-size:12px;color:var(--text2);margin-top:3px;font-family:'DM Mono',monospace;}
.hdr-date{text-align:right;font-size:11px;color:var(--text);font-family:'DM Mono',monospace;line-height:1.8;}
.sync-status{font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:20px;margin-top:4px;display:inline-block;}
.sync-ok{background:var(--gdim);color:var(--green);}
.sync-err{background:rgba(255,95,95,0.1);color:var(--red);}
.sync-loading{background:var(--adim);color:var(--amber);}
.tabs{display:flex;gap:3px;background:var(--surface);padding:3px;border-radius:var(--r);margin-bottom:18px;}
.tab{flex:1;padding:7px 4px;text-align:center;font-size:11px;font-weight:500;border-radius:var(--rs);cursor:pointer;color:var(--text2);border:1px solid transparent;background:none;transition:border-color .15s,color .15s;}
.tab:hover{color:var(--green);border-color:var(--green);}
.tab.active:hover{color:var(--green);border-color:var(--green);}
.tab.active{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
.panel{display:none;}
.panel.active{display:block;}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.card-hdr{padding:10px 14px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface2);}
.card-title{font-size:11px;font-weight:500;color:var(--text);text-transform:uppercase;letter-spacing:.6px;font-family:'DM Mono',monospace;}
.card-meta{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.stat{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:11px 13px;}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;font-family:'DM Mono',monospace;}
.stat-val{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;color:var(--green);}
.stat-val.w{color:var(--text);}
.stat-val.a{color:var(--amber);}
.hrow{display:flex;align-items:center;gap:11px;padding:10px 14px;border:1px solid transparent;border-bottom:0.5px solid var(--border);cursor:pointer;transition:border-color .15s,background .15s;}
.hrow:hover{border-color:var(--green);background:rgba(29,185,117,0.04);}
.hrow:last-child{border-bottom:0.5px solid transparent;}.hrow:last-child:hover{border-bottom:0.5px solid var(--green);border-bottom-left-radius:var(--r);border-bottom-right-radius:var(--r);}
.hrow:hover{background:var(--surface2);}
.hrow.done{opacity:.5;}
.hrow.done .htext{text-decoration:line-through;color:var(--text3);}
.cb{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;}
.cb:hover{border-color:var(--green);background:var(--gdim);}
.cb.on{background:var(--green);border-color:var(--green);}
.ck{display:none;}
.cb.on .ck{display:block;}
.htext{font-size:13px;flex:1;line-height:1.4;}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap;}
.tg{background:var(--gdim);color:var(--green);}
.tb{background:var(--bdim);color:var(--blue);}
.ta{background:var(--adim);color:var(--amber);}
.tp{background:rgba(167,139,250,.1);color:var(--purple);}
.to{background:rgba(249,115,22,.12);color:#f97316;}
.th{background:rgba(148,163,184,.12);color:#94a3b8;}
.wrow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:14px;}
.wday{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rs);padding:6px 2px;text-align:center;transition:background .1s;}
.wday:hover{background:var(--surface2);border:1px solid var(--green) !important;}
.wday:hover .wday-n{color:var(--green);}
.wday-n{font-size:7px;color:var(--text3);margin-bottom:4px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0;}
.wdot{width:24px;height:24px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;font-family:'DM Mono',monospace;}
.de{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.df{background:var(--green);color:#0e0e0f;}
.dp{background:var(--amber);color:#0e0e0f;}
.dt{outline:2px solid var(--blue);outline-offset:2px;}
input,select,textarea{background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 11px;width:100%;outline:none;transition:border .15s;box-sizing:border-box;}
input[type=date]{color-scheme:dark;}
input:focus,select:focus,textarea:focus{border-color:var(--green);}
input:hover,select:hover,textarea:hover{border-color:var(--green);color:var(--green);}
#habit-date-display:hover,#tt-date-display:hover{border-color:var(--green);color:var(--green);}
select option{background:var(--surface2);}
.irow{padding:7px 14px;display:flex;gap:7px;}
.btn{background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:9px 14px;cursor:pointer;transition:all .15s;text-align:center;}
.btn:hover{border-color:var(--green);color:var(--green);}
.btn.p{background:var(--gdim);border-color:var(--green);color:var(--green);}
.btn.p:hover{background:var(--green);color:#0e0e0f;}
.btn.d{color:var(--text3);}
.btn.d:hover{color:var(--green);border-color:var(--green);}
.brow{display:flex;gap:7px;padding:9px 14px 13px;}
.prog-wrap{background:var(--surface2);border-radius:5px;height:13px;margin:7px 0 4px;overflow:hidden;position:relative;}
.prog-fill{height:100%;border-radius:5px;transition:width .4s;display:flex;align-items:center;justify-content:flex-end;padding-right:4px;}
.pf-g{background:var(--green);}
.pf-a{background:var(--amber);}
.pf-b{background:var(--blue);}
.prog-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}
.srow{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:0.5px solid var(--border);font-size:13px;}
.srow:last-child{border-bottom:none;}
.slbl{color:var(--text2);}
.snote{font-size:11px;color:var(--text3);margin-top:1px;font-family:'DM Mono',monospace;}
.sval{font-weight:500;font-family:'DM Mono',monospace;}
.logrow{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 10px 12px;border-bottom:0.5px solid var(--border);font-size:12px;transition:background .15s;gap:8px;}.logrow:hover{background:rgba(255,255,255,0.03);}
.logrow:last-child{border-bottom:none;}.budrow{transition:background .15s;}.budrow:hover{background:rgba(255,255,255,0.03);}
.logdate{color:var(--text3);min-width:70px;font-family:'DM Mono',monospace;}
.logdesc{flex:1;color:var(--text2);padding:0 7px;}
.logamt{font-weight:500;font-family:'DM Mono',monospace;color:var(--green);}
.logamt.r{color:var(--red);}
.logscroll{max-height:220px;overflow-y:auto;}
.empty{padding:18px 14px;text-align:center;color:var(--text3);font-size:12px;font-family:'DM Mono',monospace;}.editbtn{font-size:10px;color:var(--text3);background:none;border:0.5px solid var(--border2);border-radius:4px;padding:2px 8px;cursor:pointer;transition:all .15s;font-family:'DM Mono',monospace;white-space:nowrap;}.editbtn:hover{color:var(--text);border-color:var(--text3);}.evtdel{cursor:pointer;color:var(--text3);font-size:16px;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;transition:all .15s;}.evtdel:hover{color:var(--red);background:rgba(255,95,95,0.12);}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace;}
.bg{background:var(--gdim);color:var(--green);}
.ba{background:var(--adim);color:var(--amber);}
.paybanner{background:var(--adim);border:0.5px solid var(--amber);border-radius:var(--r);padding:11px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.paytxt{font-size:11px;color:var(--amber);font-family:'DM Mono',monospace;}
.payamt{font-size:16px;font-weight:600;color:var(--amber);font-family:'DM Mono',monospace;}
.notetxt{padding:7px 14px 11px;}
.notetxt textarea{height:56px;resize:none;}
.ttrow{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:0.5px solid var(--border);}
.ttrow:last-child{border-bottom:none;}
.ttcb{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.ttcb:hover{border-color:var(--green);background:var(--gdim);}
.ttcb.on{background:var(--green);border-color:var(--green);}
.ttcb .ck{display:none;}
.ttcb.on .ck{display:block;}
.tttime{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;min-width:105px;flex-shrink:0;}
.ttlbl{font-size:13px;flex:1;}
.ttpill{font-size:10px;padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap;margin-right:4px;}
.pill-sleep{background:rgba(167,139,250,.12);color:#a78bfa;}
.pill-work{background:var(--gdim);color:var(--green);}
.pill-travel{background:rgba(107,114,128,.12);color:#9ca3af;}
.pill-gym{background:rgba(234,179,8,.12);color:#eab308;}
.pill-ball{background:rgba(234,179,8,.12);color:#ca8a04;}
.pill-meal{background:rgba(249,115,22,.12);color:#f97316;}
.pill-personal{background:var(--bdim);color:var(--blue);}
.pill-fun{background:rgba(30,30,33,.6);color:var(--text2);}
.pill-family{background:rgba(30,30,33,.6);color:var(--text2);}
.editbtn{background:none;border:0.5px solid var(--border2);border-radius:var(--rs);color:var(--text3);cursor:pointer;font-size:11px;font-family:'DM Mono',monospace;padding:3px 8px;flex-shrink:0;transition:all .15s;}
.editbtn:hover{color:var(--amber);border-color:var(--amber);}
.editpanel{padding:11px 14px;background:var(--surface2);border-top:0.5px solid var(--border);}
.editpanel input{margin-bottom:7px;}
.editpanel .brow{padding:0;margin-top:2px;}
.ttdone .ttlbl{text-decoration:line-through;color:var(--text3);}
.ttdone{opacity:.55;}
.subtabs{display:flex;gap:3px;background:var(--surface);padding:3px;border-radius:var(--rs);margin-bottom:12px;}
.subtab{flex:1;padding:6px;text-align:center;font-size:12px;font-weight:500;border-radius:var(--rs);cursor:pointer;color:var(--text2);border:1px solid transparent;background:none;transition:border-color .15s,color .15s;}
.subtab:hover{color:var(--green);border-color:var(--green);background:var(--surface2);}
.subtab.active:hover{color:var(--green);border-color:var(--green);}
.subtab.active{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
.calview{display:none;}
.calview.active{display:block;}
.calnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.caltitle{font-size:15px;font-weight:500;font-family:'DM Mono',monospace;}
.calgh{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;}
.calgh div{text-align:center;font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;padding:3px 0;}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px;}
.calcell{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rs);padding:4px;min-height:42px;cursor:pointer;transition:background .1s;}
.calcell:hover{background:var(--surface2);}
.calcell.today{border-color:var(--blue);}
.calcell.sel{border-color:var(--green);}
.calcell.other{opacity:.3;}
.calnum{font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);margin-bottom:2px;}
.calcell.today .calnum{color:var(--blue);font-weight:600;}
.dotrow{display:flex;flex-wrap:wrap;gap:2px;}
.cdot{width:5px;height:5px;border-radius:50%;}
.cd-work{background:var(--green);}
.cd-sleep{background:var(--purple);}
.cd-sports{background:#eab308;}
.cd-personal{background:var(--blue);}
.cd-learning{background:var(--amber);}
.cd-meal{background:#f97316;}
.cd-michaels{background:#ed93b1;}
.cd-travel{background:#6b7280;}
.cd-home{background:#94a3b8;}
.cd-other{background:var(--text3);}
.evtrow{display:flex;align-items:flex-start;gap:9px;padding:9px 14px;border-bottom:0.5px solid var(--border);font-size:12px;}
.evtrow:last-child{border-bottom:none;}
.evtdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.evtbody{flex:1;}
.evttitle{font-weight:500;}
.evtmeta{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px;}
.evtdel{color:var(--text3);cursor:pointer;font-size:16px;padding:0 3px;line-height:1;}
.evtdel:hover{color:var(--red);}
.wcol{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:7px;overflow:hidden;}
.wcol.today{border-color:var(--blue);}
.wcolhdr{padding:7px 12px;background:var(--surface2);border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;}
.wcolname{font-size:12px;font-weight:500;font-family:'DM Mono',monospace;}
.wcoldate{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.wevt{display:flex;align-items:center;gap:7px;padding:7px 12px;border-bottom:0.5px solid var(--border);font-size:12px;}
.wevt:last-child{border-bottom:none;}
.wnoevt{padding:9px 12px;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.devtcard{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;}
.devttype{font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-family:'DM Mono',monospace;margin-bottom:4px;}
.devttitle{font-size:15px;font-weight:500;margin-bottom:3px;}
.devtnote{font-size:12px;color:var(--text2);}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
(function(){
  var app=firebase.initializeApp({
    apiKey:"AIzaSyDXjCbGpFCE9yVNLPRj6K35Sv9F5VpINiI",
    authDomain:"michael-dashboard-ce18b.firebaseapp.com",
    projectId:"michael-dashboard-ce18b"
  });
  window.db=firebase.firestore();
  window.fbGet=async function(col,id,force){
    try{
      var ref=window.db.collection(col).doc(id);
      var snap=force?await ref.get({source:'server'}):await ref.get();
      return snap.exists?snap.data():null;
    }catch(e){return null;}
  };
  window.fbSet=async function(col,id,data){
    try{
      await window.db.collection(col).doc(id).set(data);
      if(window.setSyncStatus)window.setSyncStatus('ok');
    }catch(e){if(window.setSyncStatus)window.setSyncStatus('err');}
  };
  window.fbAddDoc=async function(col,data){
    try{
      var ref=await window.db.collection(col).add(data);
      return ref.id;
    }catch(e){return null;}
  };
  window.fbDelDoc=async function(col,id){
    try{await window.db.collection(col).doc(id).delete();}catch(e){}
  };
  window.fbGetCol=async function(col,force){
    try{
      var snap=force?await window.db.collection(col).get({source:'server'}):await window.db.collection(col).get();
      var r=[];snap.forEach(function(d){r.push(Object.assign({id:d.id},d.data()));});return r;
    }catch(e){return [];}
  };
  window.lGet=function(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}};
  window.lSet=function(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}};
})();
</script>
